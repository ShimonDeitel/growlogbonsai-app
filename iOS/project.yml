name: Growlogbonsai
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Growlogbonsai:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.growlogbonsai
        PRODUCT_NAME: Growlogbonsai
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Growlog Bonsai
        ITSAppUsesNonExemptEncryption: false
  GrowlogbonsaiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: Growlogbonsai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.growlogbonsai.tests
  GrowlogbonsaiUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: Growlogbonsai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.growlogbonsai.uitests
schemes:
  Growlogbonsai:
    build:
      targets:
        Growlogbonsai: all
    test:
      targets:
        - GrowlogbonsaiTests
        - GrowlogbonsaiUITests
    run:
      config: Debug
